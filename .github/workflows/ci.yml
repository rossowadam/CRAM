name: CRAM CI

# This workflow runs on every Pull Request to the main or development branches
on:
  pull_request:
    branches: [ main, development ]
  push:
    branches: [ main, development ]

jobs:
  # Job 1: Backend CI
  backend-checks:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Run Lint
        run: |
          cd backend
          # npm run lint (Uncomment this once you have a lint script in package.json)
          echo "Backend linting complete"

      - name: Run Tests
        run: |
          cd backend
          # npm test (Uncomment this once you have tests defined)
          echo "Backend tests complete"

  # Job 2: Frontend CI
  frontend-checks:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Lint
        run: |
          cd frontend
          npm run lint

      - name: Build Check
        run: |
          cd frontend
          npm run build
          echo "Frontend build check complete"
